    <script>
        document.addEventListener("click", function(e) {
  // Check if the clicked element is one of our special links
  const link = e.target.closest(".text-linker");
  if (!link) return;

  e.preventDefault(); // Stop the default browser jump
  
  // Extract the text from the href (e.g., "#Bananas" becomes "Bananas")
  const targetText = decodeURIComponent(link.getAttribute("href").substring(1));

  // Find all elements on the page (like h2, p, span, etc.)
  const elements = document.querySelectorAll("h1, h2, h3, p, span");
  
  // Loop through them to find the exact text match
  for (let el of elements) {
    if (el.textContent.trim() === targetText) {
      // Scroll to it smoothly and focus
      el.scrollIntoView({ behavior: "smooth", block: "center" });
      el.setAttribute("tabindex", "-1"); // Makes non-form elements focusable
      el.focus();
      break;
    }
  }
});


    </script>
